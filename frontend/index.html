<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Claim Reflex AI - Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
background:
radial-gradient(circle at top left,#2563eb 0%,transparent 35%),
radial-gradient(circle at bottom right,#06b6d4 0%,transparent 35%),
linear-gradient(135deg,#0f172a,#111827,#1e293b);
overflow:hidden;
}

body::before,
body::after{
content:"";
position:fixed;
width:300px;
height:300px;
border-radius:50%;
filter:blur(90px);
opacity:.20;
animation:float 8s ease-in-out infinite;
}

body::before{
top:-80px;
left:-80px;
background:#2563eb;
}

body::after{
right:-80px;
bottom:-80px;
background:#06b6d4;
animation-delay:3s;
}

@keyframes float{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-30px)}
}

.box{
width:100%;
max-width:420px;
background:rgba(255,255,255,.10);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,.08);
border-radius:28px;
padding:34px;
box-shadow:0 25px 55px rgba(0,0,0,.30);
animation:fadeUp .7s ease;
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(30px)}
to{opacity:1;transform:translateY(0)}
}

.logo{
font-size:34px;
font-weight:800;
color:#fff;
text-align:center;
}

.sub{
text-align:center;
color:#cbd5e1;
font-size:14px;
margin-top:8px;
margin-bottom:24px;
}

input{
width:100%;
padding:14px;
margin-bottom:14px;
border:none;
border-radius:14px;
outline:none;
font-size:15px;
background:#fff;
}

.row{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-top:4px;
}

button{
padding:14px;
border:none;
border-radius:14px;
cursor:pointer;
font-weight:800;
font-size:15px;
color:#fff;
transition:.25s;
}

button:hover{
transform:translateY(-2px);
}

.login-btn{
background:linear-gradient(90deg,#2563eb,#06b6d4);
}

.signup-btn{
background:linear-gradient(90deg,#16a34a,#22c55e);
}

#msg{
margin-top:18px;
padding:14px;
border-radius:14px;
font-size:14px;
font-weight:700;
text-align:center;
background:rgba(255,255,255,.08);
color:#e2e8f0;
min-height:48px;
display:flex;
align-items:center;
justify-content:center;
}

.small{
margin-top:16px;
text-align:center;
font-size:12px;
color:#94a3b8;
line-height:1.6;
}
</style>
</head>

<body>

<div class="box">

<div class="logo">Claim Reflex AI</div>
<div class="sub">Secure Login & Signup Portal</div>

<input type="email" id="email" placeholder="Enter Email">
<input type="password" id="password" placeholder="Enter Password">

<div class="row">
<button class="login-btn" onclick="login()">Login</button>
<button class="signup-btn" onclick="signup()">Signup</button>
</div>

<div id="msg">Welcome. Please login or create account.</div>

<div class="small">
Email verification required for new users.
</div>

</div>

<script>
const SUPABASE_URL = "https://ubdiwfsfjaaxnvygdclx.supabase.co";
const SUPABASE_KEY = "";

const { createClient } = supabase;
const supabaseClient = createClient(SUPABASE_URL,SUPABASE_KEY);

function setMsg(text,color="#e2e8f0"){
const el=document.getElementById("msg");
el.innerText=text;
el.style.color=color;
}

async function signup(){

const email=document.getElementById("email").value.trim();
const password=document.getElementById("password").value.trim();

if(!email || !password){
setMsg("Enter email and password","#fca5a5");
return;
}

setMsg("Creating account...");

const { error } = await supabaseClient.auth.signUp({
email,
password,
options:{
emailRedirectTo: window.location.origin + "/login.html"
}
});

if(error){
setMsg(error.message,"#fca5a5");
}else{
setMsg("Verification email sent. Please confirm email.","#4ade80");
}
}

async function login(){

const email=document.getElementById("email").value.trim();
const password=document.getElementById("password").value.trim();

if(!email || !password){
setMsg("Enter email and password","#fca5a5");
return;
}

setMsg("Logging in...");

const { data, error } =
await supabaseClient.auth.signInWithPassword({
email,
password
});

if(error){
setMsg(error.message,"#fca5a5");
}else{
localStorage.setItem("user",JSON.stringify(data.user));
window.location.href="app.html";
}
}
</script>

</body>
</html>
