<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      font-family: Arial, sans-serif;
      background:#f4f4f4;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      margin:0;
    }

    .box{
      background:white;
      padding:30px;
      border-radius:10px;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
      width:320px;
    }

    h2{
      margin-bottom:20px;
      text-align:center;
    }

    input{
      width:100%;
      padding:10px;
      margin-bottom:15px;
      border:1px solid #ccc;
      border-radius:5px;
      box-sizing:border-box;
    }

    button{
      width:48%;
      padding:10px;
      border:none;
      border-radius:5px;
      cursor:pointer;
      color:white;
      font-weight:bold;
    }

    .login-btn{
      background:#007bff;
    }

    .signup-btn{
      background:#28a745;
      float:right;
    }

    #msg{
      margin-top:15px;
      font-size:14px;
      color:red;
      text-align:center;
      word-wrap:break-word;
    }
  </style>
</head>

<body>

<div class="box">

<h2>Login</h2>

<input type="email" id="email" placeholder="Enter Email">
<input type="password" id="password" placeholder="Enter Password">

<button class="login-btn" onclick="login()">Login</button>
<button class="signup-btn" onclick="signup()">Signup</button>

<p id="msg"></p>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1"></script>

<script>
const SUPABASE_URL = "https://ubdiwfsfjaaxnvygdclx.supabase.co"

const SUPABASE_KEY =
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InViZGl3ZnNmamFheG52eWdkY2x4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwNTA0MjIsImV4cCI6MjA5MjYyNjQyMn0.CbvzBx2f_aq4-wl83p1y-JBrX6OWQOPq_WoP3xodamk"

const { createClient } = supabase
const supabaseClient = createClient(SUPABASE_URL, SUPABASE_KEY)

// signup
async function signup() {

  const email = document.getElementById("email").value.trim()
  const password = document.getElementById("password").value.trim()

  if(!email || !password){
    document.getElementById("msg").innerText = "Enter email and password"
    return
  }

  document.getElementById("msg").innerText = "Creating account..."

  const { error } = await supabaseClient.auth.signUp({
    email: email,
    password: password,
    options:{
      emailRedirectTo:"https://claim-reflex-ai-b1l2.vercel.app"
    }
  })

  if(error){
    document.getElementById("msg").innerText = error.message
  }else{
    document.getElementById("msg").style.color = "green"
    document.getElementById("msg").innerText =
    "Verification email sent. Please verify email."
  }
}

// login
async function login() {

  const email = document.getElementById("email").value.trim()
  const password = document.getElementById("password").value.trim()

  if(!email || !password){
    document.getElementById("msg").innerText = "Enter email and password"
    return
  }

  document.getElementById("msg").innerText = "Logging in..."

  const { data, error } =
  await supabaseClient.auth.signInWithPassword({
    email: email,
    password: password
  })

  if(error){
    document.getElementById("msg").innerText = error.message
  }else{
    localStorage.setItem("user", JSON.stringify(data.user))
    window.location.href = "app.html?v=2"
  }
}
</script>

</body>
</html>
