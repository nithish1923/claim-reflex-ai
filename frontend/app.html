<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claim Reflex AI</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
scroll-behavior:smooth;
}

body{
min-height:100vh;
background:
radial-gradient(circle at top left,#2563eb 0%,transparent 30%),
radial-gradient(circle at bottom right,#06b6d4 0%,transparent 30%),
linear-gradient(135deg,#0f172a,#111827,#1e293b);
padding:30px;
overflow-x:hidden;
}

/* animated floating glow */
body::before,
body::after{
content:"";
position:fixed;
width:320px;
height:320px;
border-radius:50%;
filter:blur(90px);
opacity:.22;
z-index:0;
animation:float 8s ease-in-out infinite;
}

body::before{
background:#3b82f6;
top:-80px;
left:-80px;
}

body::after{
background:#06b6d4;
right:-100px;
bottom:-100px;
animation-delay:3s;
}

@keyframes float{
0%,100%{transform:translateY(0px)}
50%{transform:translateY(-35px)}
}

.container{
max-width:1150px;
margin:auto;
position:relative;
z-index:2;
animation:fadeUp .9s ease;
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(35px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.card{
background:rgba(255,255,255,.10);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,.08);
border-radius:28px;
padding:32px;
box-shadow:0 20px 50px rgba(0,0,0,.25);
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
gap:20px;
flex-wrap:wrap;
margin-bottom:28px;
}

.title{
font-size:38px;
font-weight:800;
color:#fff;
letter-spacing:-1px;
}

.subtitle{
margin-top:8px;
font-size:14px;
color:#cbd5e1;
}

.tag{
display:inline-block;
margin-top:14px;
padding:8px 14px;
border-radius:999px;
font-size:12px;
font-weight:700;
background:rgba(34,197,94,.16);
color:#4ade80;
border:1px solid rgba(74,222,128,.2);
}

.logout{
border:none;
padding:12px 18px;
border-radius:14px;
cursor:pointer;
font-weight:700;
color:#fff;
background:linear-gradient(90deg,#ef4444,#dc2626);
transition:.3s ease;
}

.logout:hover{
transform:translateY(-2px);
box-shadow:0 10px 22px rgba(239,68,68,.35);
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:22px;
margin-top:22px;
}

.box{
background:rgba(255,255,255,.06);
border:1px dashed rgba(255,255,255,.18);
padding:24px;
border-radius:22px;
transition:.35s ease;
transform:translateY(0);
}

.box:hover{
transform:translateY(-6px);
border-color:#38bdf8;
box-shadow:0 16px 30px rgba(56,189,248,.15);
}

.box h3{
color:#fff;
font-size:20px;
margin-bottom:10px;
}

.box p{
font-size:14px;
color:#cbd5e1;
margin-bottom:14px;
line-height:1.5;
}

input[type=file]{
width:100%;
padding:12px;
border-radius:14px;
border:none;
background:#fff;
font-size:14px;
}

button.process{
width:100%;
margin-top:24px;
padding:16px;
font-size:18px;
font-weight:800;
border:none;
border-radius:18px;
cursor:pointer;
color:#fff;
background:linear-gradient(90deg,#2563eb,#06b6d4);
transition:.35s ease;
box-shadow:0 18px 30px rgba(37,99,235,.28);
}

button.process:hover{
transform:translateY(-3px) scale(1.01);
}

button.process:active{
transform:scale(.98);
}

#msg{
margin-top:20px;
padding:16px;
border-radius:16px;
font-weight:700;
font-size:14px;
background:rgba(255,255,255,.08);
color:#e2e8f0;
transition:.4s ease;
}

.result{
margin-top:22px;
border-radius:24px;
padding:22px;
background:#081120;
border:1px solid rgba(255,255,255,.06);
transition:.4s ease;
}

.result-head{
display:flex;
justify-content:space-between;
align-items:center;
gap:12px;
margin-bottom:16px;
flex-wrap:wrap;
}

.result-title{
font-size:22px;
font-weight:800;
color:#fff;
}

.badge{
padding:8px 14px;
border-radius:999px;
font-size:12px;
font-weight:800;
}

.green{
background:rgba(34,197,94,.18);
color:#4ade80;
}

.red{
background:rgba(239,68,68,.18);
color:#f87171;
}

.blue{
background:rgba(59,130,246,.18);
color:#60a5fa;
}

.bar{
margin-top:14px;
height:12px;
background:#1e293b;
border-radius:999px;
overflow:hidden;
}

.fill{
height:100%;
width:0%;
background:linear-gradient(90deg,#22c55e,#3b82f6);
transition:1.1s ease;
}

pre{
margin-top:18px;
white-space:pre-wrap;
word-wrap:break-word;
font-size:14px;
color:#cbd5e1;
line-height:1.7;
}

@media(max-width:850px){
.grid{
grid-template-columns:1fr;
}
.title{
font-size:30px;
}
.card{
padding:22px;
}
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<div class="top">
<div>
<div class="title">Claim Reflex AI</div>
<div class="subtitle">AI Claim & Policy Decision Platform</div>
<div class="tag">LIVE SYSTEM</div>
</div>

<button class="logout" onclick="logout()">Logout</button>
</div>

<div class="grid">

<div class="box">
<h3>📄 Policy Document</h3>
<p>Upload insurance / policy PDF for AI validation.</p>
<input type="file" id="policy" accept=".pdf">
</div>

<div class="box">
<h3>🧾 Claim Document</h3>
<p>Upload customer claim request PDF.</p>
<input type="file" id="claim" accept=".pdf">
</div>

</div>

<button class="process" onclick="run()">⚡ Analyze Claim</button>

<div id="msg">Waiting for documents...</div>

<div class="result">
<div class="result-head">
<div class="result-title">Assessment Result</div>
<div id="badge" class="badge blue">Pending</div>
</div>

<div class="bar">
<div class="fill" id="fill"></div>
</div>

<pre id="out">Upload files and run analysis.</pre>
</div>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://ubdiwfsfjaaxnvygdclx.supabase.co";
const SUPABASE_KEY = "YOUR_SUPABASE_KEY";
const BACKEND = "https://claim-reflex-ai.onrender.com";

const { createClient } = supabase;
const supabaseClient = createClient(SUPABASE_URL,SUPABASE_KEY);

function logout(){
localStorage.clear();
window.location.href="index.html";
}

async function uploadFile(file){

const fileName = Date.now() + "_" + file.name;

const { error } = await supabaseClient.storage
.from("documents")
.upload(fileName,file);

if(error) throw error;

const { data } = supabaseClient.storage
.from("documents")
.getPublicUrl(fileName);

return data.publicUrl;
}

function setProgress(v){
document.getElementById("fill").style.width = v + "%";
}

function setBadge(text,type){
const badge = document.getElementById("badge");
badge.className = "badge " + type;
badge.innerText = text;
}

async function run(){

const msg = document.getElementById("msg");
const out = document.getElementById("out");

try{

const p = document.getElementById("policy").files[0];
const c = document.getElementById("claim").files[0];

if(!p || !c){
msg.innerText = "Please upload both Policy and Claim documents.";
return;
}

msg.innerText = "Uploading files...";
setProgress(20);

const policy_url = await uploadFile(p);
const claim_url = await uploadFile(c);

msg.innerText = "AI analyzing claim...";
setProgress(65);

const res = await fetch(BACKEND + "/process",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
policy_url,
claim_url
})
});

const data = await res.json();

setProgress(100);
msg.innerText = "Analysis completed.";

if(data.status === "processed"){

setBadge(data.final.decision || "Approved","green");

out.innerText =
"Decision: " + data.final.decision + "\n\n" +
"Confidence: " + Math.round((data.final.confidence || 0.85)*100) + "%\n\n" +
"Reason:\n" + data.final.reason;

}else if(data.status === "rejected"){

setBadge("Rejected","red");

out.innerText =
"Claim Rejected\n\nReasons:\n" +
(data.errors || []).join("\n");

}else{

setBadge("Error","red");
out.innerText = JSON.stringify(data,null,2);

}

}catch(err){

msg.innerText = err.message;
setBadge("Error","red");
out.innerText = err.message;

}

}
</script>

</body>
</html>
