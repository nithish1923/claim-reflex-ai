<!DOCTYPE html>
<html>
<body>

<script>
if (!localStorage.getItem("user")) {
  window.location.href = "login.html"
}
</script>

<h3>Upload Files</h3>

<input type="file" id="policy"><br><br>
<input type="file" id="claim"><br><br>

<button onclick="run()">Process</button>

<pre id="out"></pre>

<script>
const SUPABASE_URL = "YOUR_SUPABASE_URL"
const SUPABASE_KEY = "YOUR_SUPABASE_KEY"
const BACKEND = "YOUR_BACKEND_URL"

async function upload(file) {
  await fetch(`${SUPABASE_URL}/storage/v1/object/documents/${file.name}`, {
    method: "POST",
    headers: {
      "apikey": SUPABASE_KEY,
      "Authorization": `Bearer ${SUPABASE_KEY}`,
      "Content-Type": file.type
    },
    body: file
  })

  return `${SUPABASE_URL}/storage/v1/object/public/documents/${file.name}`
}

async function run() {
  let p = document.getElementById("policy").files[0]
  let c = document.getElementById("claim").files[0]

  let p_url = await upload(p)
  let c_url = await upload(c)

  let res = await fetch(`${BACKEND}/process`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({policy_url: p_url, claim_url: c_url})
  })

  let data = await res.json()

  document.getElementById("out").innerText =
    JSON.stringify(data, null, 2)
}
</script>

</body>
</html>
