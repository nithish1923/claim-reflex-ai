<!DOCTYPE html>
<html>
<head>
<title>Claim Reflex AI</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
min-height:100vh;
padding:30px;
}

.container{
max-width:950px;
margin:auto;
}

.card{
background:white;
padding:30px;
border-radius:18px;
box-shadow:0 20px 45px rgba(0,0,0,0.15);
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:15px;
margin-bottom:25px;
}

.title{
font-size:32px;
font-weight:bold;
color:#0f172a;
}

.subtitle{
color:#64748b;
margin-top:6px;
font-size:14px;
}

.logout{
background:#ef4444;
color:white;
border:none;
padding:10px 18px;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-top:20px;
}

.box{
background:#f8fafc;
border:2px dashed #cbd5e1;
padding:22px;
border-radius:14px;
}

.box h3{
margin-bottom:10px;
color:#0f172a;
font-size:20px;
}

.box p{
font-size:14px;
color:#64748b;
margin-bottom:14px;
}

input[type=file]{
width:100%;
padding:10px;
border:1px solid #cbd5e1;
border-radius:10px;
background:white;
}

button.process{
width:100%;
margin-top:25px;
padding:16px;
font-size:18px;
font-weight:bold;
border:none;
border-radius:12px;
cursor:pointer;
background:linear-gradient(90deg,#2563eb,#1d4ed8);
color:white;
}

#msg{
margin-top:18px;
padding:14px;
background:#eff6ff;
border-radius:10px;
color:#1d4ed8;
font-weight:bold;
}

pre{
margin-top:20px;
background:#0f172a;
color:#22c55e;
padding:20px;
border-radius:14px;
overflow:auto;
white-space:pre-wrap;
}

.tag{
display:inline-block;
margin-top:10px;
padding:6px 12px;
border-radius:30px;
background:#dcfce7;
color:#15803d;
font-size:12px;
font-weight:bold;
}

@media(max-width:768px){
.grid{
grid-template-columns:1fr;
}

.title{
font-size:26px;
}
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<div class="top">
<div>
<div class="title">Claim Reflex AI</div>
<div class="subtitle">AI Claim & Policy Decision Platform</div>
<div class="tag">LIVE SYSTEM</div>
</div>

<button class="logout" onclick="logout()">Logout</button>
</div>

<div class="grid">

<div class="box">
<h3>📄 Policy Document</h3>
<p>Upload insurance / policy PDF</p>
<input type="file" id="policy" accept=".pdf">
</div>

<div class="box">
<h3>🧾 Claim Document</h3>
<p>Upload claim request PDF</p>
<input type="file" id="claim" accept=".pdf">
</div>

</div>

<button class="process" onclick="run()">⚡ Analyze Claim</button>

<p id="msg">Waiting for documents...</p>

<pre id="out"></pre>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://ubdiwfsfjaaxnvygdclx.supabase.co"
const SUPABASE_KEY = "PASTE_YOUR_PUBLISHABLE_KEY"
const BACKEND = "https://claim-reflex-ai.onrender.com"

const { createClient } = supabase
const supabaseClient = createClient(SUPABASE_URL,SUPABASE_KEY)

function logout(){
localStorage.clear()
window.location.href="index.html"
}

async function uploadFile(file){

const fileName = Date.now() + "_" + file.name

const { error } = await supabaseClient.storage
.from("documents")
.upload(fileName,file)

if(error){
throw error
}

const { data } = supabaseClient.storage
.from("documents")
.getPublicUrl(fileName)

return data.publicUrl
}

async function run(){

try{

const p = document.getElementById("policy").files[0]
const c = document.getElementById("claim").files[0]

if(!p || !c){
document.getElementById("msg").innerText =
"Please upload both Policy and Claim documents."
return
}

document.getElementById("msg").innerText = "Uploading files..."

const policy_url = await uploadFile(p)
const claim_url = await uploadFile(c)

document.getElementById("msg").innerText = "AI analyzing claim..."

const res = await fetch(BACKEND + "/process",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
policy_url,
claim_url
})
})

const data = await res.json()

document.getElementById("msg").innerText =
"Analysis completed."

document.getElementById("out").innerText =
JSON.stringify(data,null,2)

}catch(err){

document.getElementById("msg").innerText =
err.message

}

}
</script>

</body>
</html>
