<!DOCTYPE html>
<html>
<head>
  <title>Claim Reflex AI</title>
</head>
<body>

<script>
if (!localStorage.getItem("user")) {
  window.location.href = "login.html"
}
</script>

<h3>Claim Reflex AI</h3>

<button onclick="logout()">Logout</button>

<br><br>

<input type="file" id="policy"><br><br>
<input type="file" id="claim"><br><br>

<button onclick="run()">Process</button>

<pre id="out"></pre>

<script>
const SUPABASE_URL = "https://ubdiwfsfjaaxnvygdclx.supabase.co"
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
const BACKEND = "https://claim-reflex-ai.onrender.com"

function logout() {
  localStorage.removeItem("user")
  window.location.href = "login.html"
}

async function upload(file) {
  const fileName = Date.now() + "_" + file.name

  await fetch(`${SUPABASE_URL}/storage/v1/object/documents/${fileName}`, {
    method: "POST",
    headers: {
      "apikey": SUPABASE_KEY,
      "Authorization": `Bearer ${SUPABASE_KEY}`,
      "Content-Type": file.type
    },
    body: file
  })

  return `${SUPABASE_URL}/storage/v1/object/public/documents/${fileName}`
}

async function run() {
  let p = document.getElementById("policy").files[0]
  let c = document.getElementById("claim").files[0]

  if (!p || !c) {
    alert("Please upload both files")
    return
  }

  document.getElementById("out").innerText = "Processing..."

  let p_url = await upload(p)
  let c_url = await upload(c)

  let res = await fetch(`${BACKEND}/process`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      policy_url: p_url,
      claim_url: c_url
    })
  })

  let data = await res.json()

  document.getElementById("out").innerText =
    JSON.stringify(data, null, 2)
}
</script>

</body>
</html>
