<!DOCTYPE html>
<html>
<head>
<title>Claim Reflex AI</title>
<style>
body{
font-family:Arial;
padding:30px;
background:#f4f4f4;
}

.box{
background:white;
padding:25px;
border-radius:10px;
max-width:500px;
margin:auto;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

button{
padding:10px 15px;
margin-top:10px;
cursor:pointer;
}

pre{
background:#111;
color:#0f0;
padding:15px;
overflow:auto;
}
</style>
</head>

<body>

<div class="box">

<h2>Claim Reflex AI</h2>

<button onclick="logout()">Logout</button>

<br><br>

<input type="file" id="policy"><br><br>
<input type="file" id="claim"><br><br>

<button onclick="run()">Process</button>

<p id="msg"></p>

<pre id="out"></pre>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://ubdiwfsfjaaxnvygdclx.supabase.co"
const SUPABASE_KEY = "PASTE_YOUR_PUBLISHABLE_KEY"
const BACKEND = "https://claim-reflex-ai.onrender.com"

const { createClient } = supabase
const supabaseClient = createClient(SUPABASE_URL,SUPABASE_KEY)

function logout(){
localStorage.clear()
window.location.href="index.html"
}

async function uploadFile(file){

const fileName = Date.now() + "_" + file.name

const { data, error } = await supabaseClient.storage
.from("documents")
.upload(fileName, file)

if(error){
throw error
}

const { data: urlData } = supabaseClient.storage
.from("documents")
.getPublicUrl(fileName)

return urlData.publicUrl
}

async function run(){

try{

document.getElementById("msg").innerText="Uploading..."

const p = document.getElementById("policy").files[0]
const c = document.getElementById("claim").files[0]

if(!p || !c){
alert("Upload both files")
return
}

const policy_url = await uploadFile(p)
const claim_url = await uploadFile(c)

document.getElementById("msg").innerText="Processing..."

const res = await fetch(BACKEND + "/process",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
policy_url,
claim_url
})
})

const data = await res.json()

document.getElementById("msg").innerText="Done"

document.getElementById("out").innerText =
JSON.stringify(data,null,2)

}catch(err){

document.getElementById("msg").innerText =
err.message

}

}
</script>

</body>
</html>
